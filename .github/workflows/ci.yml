name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/typescript
            p/react
            ./semgrep-rules/earthmove.yml

  migrations:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Validate migration filenames and destructive ops
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          bad=()
          for f in supabase/migrations/*.sql; do
            base=$(basename "$f")
            if ! [[ "$base" =~ ^[0-9]{3}_[a-z0-9_]+\.sql$ ]]; then
              bad+=("$base")
            fi
          done
          if [ ${#bad[@]} -gt 0 ]; then
            echo "Migration filenames must match ^[0-9]{3}_[a-z0-9_]+\.sql$" >&2
            printf '  %s\n' "${bad[@]}" >&2
            exit 1
          fi

          destructive=0
          if grep -Pn '\b(DROP\s+TABLE|DROP\s+COLUMN|TRUNCATE)\b' supabase/migrations/*.sql >/dev/null 2>&1; then
            destructive=1
          fi
          if grep -Pn '\bDELETE\s+FROM\b(?!.*\bWHERE\b)' supabase/migrations/*.sql >/dev/null 2>&1; then
            destructive=1
          fi

          if [ "$destructive" = "1" ]; then
            msg="$(git log -1 --format=%B)"
            if ! echo "$msg" | grep -qF -- '--allow-destructive'; then
              echo "Destructive migration detected. Commit message must contain '--allow-destructive'." >&2
              exit 1
            fi
          fi
